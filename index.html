<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1120" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>FinFlow — Personal finance dashboard</title>
    <meta name="description" content="FinFlow — track balance, spending, and insights in one crafted dashboard." />
    <meta name="author" content="FinFlow" />

    <meta property="og:title" content="FinFlow — Personal finance dashboard" />
    <meta property="og:description" content="FinFlow — track balance, spending, and insights in one crafted dashboard." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        try {
          var v = localStorage.getItem("finance-dark-mode");
          if (v === "false") document.documentElement.classList.remove("dark");
          else document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
